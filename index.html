<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f9f9f9;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .card {
            width: min(100%, 380px);
            padding: 30px 20px;
            border: 5px solid #3498db;
            border-radius: 15px;
            background: #f3bcc0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 12px;
        }

        #name {
            display: block;
            font-weight: bold;
            font-size: clamp(1.3rem, 4vw, 2rem);
            color: rgb(245, 45, 5);
            text-transform: uppercase;
            margin-bottom: 10px;
            word-break: break-word;
        }

        p {
            font-size: clamp(0.95rem, 2.5vw, 1rem);
            margin-bottom: 20px;
            color: #333;
            line-height: 1.5;
        }

        button {
            padding: 12px 20px;
            font-size: clamp(0.95rem, 2.5vw, 1rem);
            background: black;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 220px;
        }

        #hiddenMessage {
            display: none;
            color: green;
            margin-top: 20px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            line-height: 1.5;
            cursor: pointer;
            padding: 0 8px;
        }

        .balloon {
            width: 60px;
            height: 80px;
            border-radius: 50%;
            position: absolute;
            bottom: -100px;
            animation: floatUp 6s linear forwards;
            z-index: 1;
        }

        .string {
            width: 2px;
            height: 50px;
            background: #444;
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
        }

        img {
            display: none;
            margin: 15px auto;
            width: 300px;
            height: 250px;
            max-width: 100%;
            /* add this line */
            border-radius: 12px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .card {
                padding: 25px 18px;
                max-width: 340px;
            }

            .balloon {
                width: 50px;
                height: 70px;
            }

            .string {
                height: 40px;
                top: 70px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .card {
                width: 100%;
                padding: 22px 15px;
                border-width: 3px;
                border-radius: 12px;
            }

            button {
                max-width: 100%;
            }

            .balloon {
                width: 42px;
                height: 58px;
            }

            .string {
                height: 32px;
                top: 58px;
            }

            img {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Happy Birthday 🎂</h1>
        <span id="name"></span>
        <p>To the best brother 🤢😞 </p>

        <button id="wishButton">Click for Surprise</button>

        <h2 id="hiddenMessage">
            Hope your year is full of bugs that are easy to fix 🚀
        </h2>

        <img src="./image (2).jpeg" alt="Birthday Image" style="display: none;">
    </div>

    <script src="birthday.js"></script>

</body>

</html>
